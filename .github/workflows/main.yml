name: V-Trace CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-backend:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Run Integration & Unit Tests
        env:
          PORT: 5000
          MONGO_URI: mongodb://localhost:27017/vtrace-test
          JWT_SECRET: testing_jwt_secret_value_must_be_longer_and_secure
          JWT_REFRESH_SECRET: testing_jwt_refresh_secret_value_must_be_longer_and_secure
          NODE_ENV: test
        run: |
          cd backend
          npm test

  test-frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm ci

      - name: Compile and Build Assets
        run: |
          cd frontend
          npm run build
